<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma's Maths Practice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1f2937;
    line-height: 1.5;
  }
  .container { max-width: 920px; margin: 0 auto; }
  header {
    text-align: center;
    margin-bottom: 24px;
    padding: 24px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  h1 { color: #7c3aed; font-size: 26px; margin-bottom: 6px; }
  .subtitle { color: #6b7280; font-size: 14px; }
  .scoreboard {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 14px; flex-wrap: wrap;
  }
  .score-pill {
    background: #f5f3ff; padding: 6px 14px; border-radius: 16px;
    color: #5b21b6; font-weight: 600; font-size: 14px;
  }
  .score-pill .num { font-size: 18px; }
  .progress-bar {
    height: 8px; background: #e5e7eb; border-radius: 4px;
    margin-top: 14px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #7c3aed, #ec4899);
    width: 0%; transition: width 0.4s;
  }

  .menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 14px;
  }
  .activity-card {
    background: white; border-radius: 14px; padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    border: 2px solid transparent;
    display: flex; flex-direction: column;
  }
  .activity-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    border-color: #c4b5fd;
  }
  .activity-card.mastered {
    background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
    border-color: #10b981;
  }
  .activity-card .icon {
    font-size: 32px; margin-bottom: 8px;
  }
  .activity-card h3 {
    color: #5b21b6; font-size: 17px; margin-bottom: 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .activity-card.mastered h3 { color: #065f46; }
  .activity-card .check {
    color: #10b981; font-weight: bold; font-size: 20px;
  }
  .activity-card .focus {
    font-size: 12px; color: #9ca3af; margin-bottom: 8px;
  }
  .activity-card p { font-size: 14px; color: #4b5563; }
  .activity-card .stats {
    margin-top: auto; padding-top: 8px;
    font-size: 12px; color: #6b7280;
  }

  .activity-screen {
    background: white; border-radius: 18px; padding: 26px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .activity-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .back-btn {
    background: #f3f4f6; border: none; color: #4b5563;
    font-size: 14px; cursor: pointer; padding: 8px 14px;
    border-radius: 8px; font-weight: 500;
  }
  .back-btn:hover { background: #e5e7eb; }
  .activity-title { color: #7c3aed; font-size: 22px; flex: 1; }
  .round-counter {
    background: #ede9fe; color: #5b21b6;
    padding: 4px 12px; border-radius: 12px;
    font-size: 13px; font-weight: 600;
  }

  .question-box {
    background: #f9fafb; border-radius: 14px; padding: 22px;
    margin: 16px 0; text-align: center;
  }
  .question-prompt {
    font-size: 14px; color: #6b7280; margin-bottom: 10px;
  }
  .question-content {
    font-size: 26px; font-weight: bold; color: #1f2937;
    font-family: "Courier New", monospace;
  }
  .question-content.normal { font-family: inherit; }

  .options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px; margin: 16px 0;
  }
  .option-btn {
    background: white; border: 2px solid #e5e7eb;
    padding: 14px; border-radius: 10px; cursor: pointer;
    font-size: 18px; font-weight: 600; transition: all 0.15s;
    font-family: "Courier New", monospace;
  }
  .option-btn.normal { font-family: inherit; }
  .option-btn:hover:not(:disabled) {
    border-color: #7c3aed; background: #f5f3ff;
    transform: translateY(-1px);
  }
  .option-btn:disabled { cursor: default; opacity: 0.7; }
  .option-btn.correct {
    background: #d1fae5; border-color: #10b981; color: #065f46;
  }
  .option-btn.incorrect {
    background: #fee2e2; border-color: #ef4444; color: #991b1b;
  }
  .option-btn.reveal {
    background: #d1fae5; border-color: #10b981; color: #065f46;
  }

  .feedback {
    padding: 14px 18px; border-radius: 10px; margin: 14px 0;
    display: none;
  }
  .feedback.show { display: block; animation: slideIn 0.3s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.correct { background: #d1fae5; color: #065f46; }
  .feedback.incorrect { background: #fef3c7; color: #92400e; }
  .feedback h4 { margin-bottom: 6px; font-size: 16px; }
  .feedback p { font-size: 14px; }

  .actions {
    display: flex; gap: 10px; justify-content: center; margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    background: #7c3aed; color: white; border: none;
    padding: 12px 24px; border-radius: 10px; font-size: 16px;
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn:hover { background: #6d28d9; }
  .btn:disabled { background: #c4b5fd; cursor: not-allowed; }
  .btn-secondary { background: #e5e7eb; color: #1f2937; }
  .btn-secondary:hover { background: #d1d5db; }

  .number-tile {
    display: inline-block; padding: 12px 20px;
    background: #ede9fe; border: 2px solid #c4b5fd;
    border-radius: 10px; margin: 4px; cursor: pointer;
    font-size: 20px; font-weight: bold;
    transition: all 0.15s; user-select: none;
    font-family: "Courier New", monospace;
  }
  .number-tile:hover:not(.disabled) {
    background: #ddd6fe; transform: translateY(-2px);
  }
  .number-tile.disabled { opacity: 0.3; cursor: not-allowed; }
  .answer-slots {
    display: flex; gap: 6px; justify-content: center;
    flex-wrap: wrap; min-height: 64px; padding: 12px;
    background: white; border-radius: 10px;
    border: 2px dashed #d1d5db; align-items: center;
  }
  .answer-slot {
    min-width: 56px; min-height: 44px; padding: 8px 14px;
    background: #7c3aed; color: white; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px;
    font-family: "Courier New", monospace;
  }
  .answer-slot.empty {
    background: transparent; color: #d1d5db;
    border: 2px dashed #e5e7eb;
  }
  .arrow { color: #9ca3af; font-size: 20px; align-self: center; }

  .tip {
    background: #fef3c7; border-left: 4px solid #f59e0b;
    padding: 12px 16px; border-radius: 6px; margin: 14px 0;
    font-size: 14px; color: #78350f;
  }
  .tip strong { color: #92400e; }

  .number-line-wrap {
    margin: 12px 0; padding: 16px; background: white;
    border-radius: 10px; border: 1px solid #e5e7eb;
  }

  .step-list {
    margin: 14px 0;
  }
  .step-row {
    background: #f9fafb; padding: 12px 16px; border-radius: 8px;
    margin: 8px 0; font-size: 16px;
    font-family: "Courier New", monospace;
    border-left: 3px solid #c4b5fd;
  }
  .step-row.active {
    border-left-color: #7c3aed; background: #f5f3ff;
  }
  .step-row.done {
    border-left-color: #10b981;
  }
  .step-label {
    font-size: 12px; color: #6b7280;
    font-family: inherit; margin-bottom: 4px;
  }

  .factor-input-row {
    display: flex; gap: 8px; align-items: center;
    justify-content: center; margin: 10px 0;
    font-size: 20px; font-family: "Courier New", monospace;
  }
  .input-num {
    width: 70px; padding: 8px; font-size: 18px;
    border: 2px solid #c4b5fd; border-radius: 6px;
    text-align: center; font-family: "Courier New", monospace;
  }
  .input-num:focus { outline: none; border-color: #7c3aed; }
  .pairs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px; margin: 12px 0;
  }
  .pair-chip {
    background: #ede9fe; padding: 10px;
    border-radius: 8px; text-align: center;
    font-weight: 600; color: #5b21b6;
    font-family: "Courier New", monospace;
  }
  .pair-chip.prime {
    background: #fef3c7; color: #92400e;
    border: 2px solid #f59e0b;
  }

  .angle-svg {
    display: block; margin: 16px auto;
    background: #f9fafb; border-radius: 10px;
    padding: 10px;
  }

  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #10b981; color: white;
    padding: 14px 24px; border-radius: 10px;
    font-weight: 600; z-index: 1000;
    box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
    transition: transform 0.3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #ef4444; box-shadow: 0 4px 16px rgba(239,68,68,0.3); }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    body { padding: 10px; }
    h1 { font-size: 22px; }
    .activity-screen { padding: 18px; }
    .question-content { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="toast" class="toast">Correct!</div>

<div class="container">
  <header>
    <h1>Emma's Maths Adventure</h1>
    <div class="subtitle">Practice the bits that tripped you up — go at your own pace</div>
    <div class="scoreboard">
      <div class="score-pill">Activities mastered: <span class="num" id="masteredCount">0</span> / 7</div>
      <div class="score-pill">Total correct: <span class="num" id="totalCorrect">0</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="overallProgress"></div></div>
  </header>

  <div id="menu" class="menu"></div>
  <div id="activityArea" class="hidden"></div>
</div>

<script>
// ============================================================
// Game state
// ============================================================
const state = {
  totalCorrect: 0,
  activities: {} // id -> { correct, total, mastered }
};

// ============================================================
// Activity definitions
// ============================================================
const ACTIVITIES = [
  {
    id: 'order',
    icon: '🔢',
    title: 'Number Ladder',
    focus: 'Q1 — ordering integers',
    desc: 'Put numbers in descending order. Remember: with negatives, -3 is SMALLER than -1.',
    masterTarget: 4,
  },
  {
    id: 'powers',
    icon: '⚡',
    title: 'Power Trap',
    focus: 'Q4a — squaring negatives',
    desc: '(-4)² is 16, not -8. Watch out for the bracket trap!',
    masterTarget: 5,
  },
  {
    id: 'bidmas',
    icon: '🎯',
    title: 'BIDMAS Boss',
    focus: 'Q4c — order of operations',
    desc: 'Brackets, Indices, Division/Multiplication, Addition/Subtraction. Step it out.',
    masterTarget: 4,
  },
  {
    id: 'factors',
    icon: '🔍',
    title: 'Factor Pair Hunter',
    focus: 'Q5 — list ALL factors',
    desc: 'Find every factor pair. The trick: stop when pairs start to repeat.',
    masterTarget: 3,
  },
  {
    id: 'brackets',
    icon: '🧩',
    title: 'Bracket Detective',
    focus: 'Q6 — place grouping symbols',
    desc: 'Where do the brackets go to hit the target answer?',
    masterTarget: 4,
  },
  {
    id: 'naming',
    icon: '📐',
    title: 'Vertex Hunter',
    focus: 'B3 — naming angles',
    desc: 'The MIDDLE letter is always the vertex (corner). E.g. ∠SQR has vertex Q.',
    masterTarget: 4,
  },
  {
    id: 'types',
    icon: '🌀',
    title: 'Angle Zoo',
    focus: 'B4 — angle types',
    desc: 'Acute, right, obtuse, straight, reflex, revolution. Know the difference.',
    masterTarget: 6,
  },
  {
    id: 'fractions',
    icon: '🥞',
    title: 'Fraction Stacker',
    focus: '2026 Topic 3 — adding/subtracting fractions',
    desc: 'Add and subtract fractions, with and without common denominators. Includes mixed numerals.',
    masterTarget: 5,
  },
  {
    id: 'indices',
    icon: '🔍',
    title: 'Index Detective',
    focus: '2026 — index laws & zero index',
    desc: 'Index laws (×, ÷, power of a power) and the all-important zero-index rule.',
    masterTarget: 5,
  },
  {
    id: 'parallels',
    icon: '🚂',
    title: 'Parallel Line Hunter',
    focus: '2026 Topic 2 — transversals on parallel lines',
    desc: 'Alternate, co-interior, corresponding angles. Spot the Z, C and F shapes.',
    masterTarget: 4,
  },
];

// ============================================================
// Activity 1: Number Ladder (descending order)
// ============================================================
const ORDER_ROUNDS = [
  { nums: [15, -3, 0, 4, -1] },
  { nums: [-8, 7, -2, 0, 12] },
  { nums: [5, -5, 0, -10, 10, -1] },
  { nums: [-15, -3, -7, -1, 0] },
  { nums: [22, -8, 14, -14, 8, -22] },
];

function buildOrderActivity(roundIdx = 0) {
  const round = ORDER_ROUNDS[roundIdx % ORDER_ROUNDS.length];
  const nums = [...round.nums];
  // Shuffle visible order
  const shuffled = nums.slice().sort(() => Math.random() - 0.5);
  const correctOrder = nums.slice().sort((a, b) => b - a);
  let picked = [];

  const html = `
    <div class="question-box">
      <div class="question-prompt">Click the numbers in DESCENDING order (biggest first)</div>
      <div class="question-content normal">Smallest on the right — remember -10 is SMALLER than -1</div>
    </div>
    <div class="number-line-wrap">
      <svg viewBox="0 -20 400 40" width="100%" height="40">
        <line x1="20" y1="0" x2="380" y2="0" stroke="#9ca3af" stroke-width="2"/>
        <polygon points="380,0 372,-5 372,5" fill="#9ca3af"/>
        <polygon points="20,0 28,-5 28,5" fill="#9ca3af"/>
        ${[-12,-8,-4,0,4,8,12].map((v,i) => {
          const x = 20 + (i * 60);
          return `<line x1="${x}" y1="-5" x2="${x}" y2="5" stroke="#9ca3af" stroke-width="1.5"/>
                  <text x="${x}" y="18" text-anchor="middle" font-size="11" fill="#6b7280">${v}</text>`;
        }).join('')}
      </svg>
    </div>
    <div id="orderTiles" style="text-align:center;margin:14px 0">
      ${shuffled.map(n => `<span class="number-tile" data-val="${n}">${n}</span>`).join('')}
    </div>
    <div class="answer-slots" id="orderSlots">
      ${nums.map(() => `<div class="answer-slot empty">?</div>`).join('<span class="arrow">→</span>')}
    </div>
    <div class="feedback" id="orderFeedback"></div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="resetOrder()">Start over</button>
      <button class="btn" id="orderNext" onclick="nextOrder(${roundIdx})" disabled>Next round</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

  document.querySelectorAll('#orderTiles .number-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      if (tile.classList.contains('disabled')) return;
      const val = parseInt(tile.dataset.val);
      tile.classList.add('disabled');
      picked.push(val);
      renderOrderSlots();
      checkOrder();
    });
  });

  function renderOrderSlots() {
    const slotsEl = document.getElementById('orderSlots');
    const arrows = nums.length - 1;
    let h = '';
    for (let i = 0; i < nums.length; i++) {
      if (i > 0) h += '<span class="arrow">→</span>';
      if (i < picked.length) h += `<div class="answer-slot">${picked[i]}</div>`;
      else h += `<div class="answer-slot empty">?</div>`;
    }
    slotsEl.innerHTML = h;
  }

  function checkOrder() {
    if (picked.length !== nums.length) return;
    const isCorrect = picked.every((v, i) => v === correctOrder[i]);
    const fb = document.getElementById('orderFeedback');
    fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
    if (isCorrect) {
      fb.innerHTML = `<h4>✓ Nice work!</h4><p>${correctOrder.join(' &gt; ')}</p>`;
      registerScore('order', true);
      document.getElementById('orderNext').disabled = false;
      toast('Correct! 🎉');
    } else {
      fb.innerHTML = `<h4>Not quite. Try again!</h4>
        <p>Correct order: <strong>${correctOrder.join(' > ')}</strong></p>
        <p style="margin-top:6px"><em>Tip: imagine the number line. The further LEFT a number is, the smaller it is.</em></p>`;
      registerScore('order', false);
      document.getElementById('orderNext').disabled = false;
    }
  }

  window.resetOrder = () => buildOrderActivity(roundIdx);
  window.nextOrder = (i) => buildOrderActivity(i + 1);
}

// ============================================================
// Activity 2: Power Trap
// ============================================================
const POWER_QUESTIONS = [
  { q: '(-4)²', a: 16, opts: [-16, -8, 8, 16],
    why: '(-4)² means -4 × -4. Negative × negative = positive. So -4 × -4 = <strong>16</strong>.' },
  { q: '(-3)²', a: 9, opts: [-9, 6, 9, -6],
    why: '(-3)² means -3 × -3 = <strong>9</strong>. Two negatives multiply to a positive.' },
  { q: '(-5)²', a: 25, opts: [-25, -10, 10, 25],
    why: '(-5)² = -5 × -5 = <strong>25</strong>. Don\'t multiply by 2 — that\'s a different operation!' },
  { q: '(-2)³', a: -8, opts: [8, -8, 6, -6],
    why: '(-2)³ = -2 × -2 × -2. First: -2 × -2 = 4. Then: 4 × -2 = <strong>-8</strong>. Odd power keeps the sign.' },
  { q: '-4²', a: -16, opts: [16, -16, 8, -8],
    why: 'TRAP! Without brackets, square the 4 FIRST: 4² = 16. Then apply the minus: <strong>-16</strong>. Compare with (-4)² which equals +16.' },
  { q: '(-1)²', a: 1, opts: [-1, 1, 0, 2],
    why: '(-1) × (-1) = <strong>1</strong>. Negatives cancel.' },
  { q: '(-6)²', a: 36, opts: [-36, 36, -12, 12],
    why: '-6 × -6 = <strong>36</strong>. Same rule, bigger number.' },
];

function buildPowersActivity(qIdx = 0) {
  const q = POWER_QUESTIONS[qIdx % POWER_QUESTIONS.length];
  const html = `
    <div class="question-box">
      <div class="question-prompt">Solve this:</div>
      <div class="question-content">${q.q} = ?</div>
    </div>
    <div class="options" id="powerOpts">
      ${q.opts.map(o => `<button class="option-btn" data-val="${o}">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="powerFeedback"></div>
    <div class="actions">
      <button class="btn" id="powerNext" onclick="buildPowersActivity(${qIdx + 1})" disabled>Next question</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

  document.querySelectorAll('#powerOpts .option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = parseInt(btn.dataset.val);
      const correct = val === q.a;
      document.querySelectorAll('#powerOpts .option-btn').forEach(b => {
        b.disabled = true;
        if (parseInt(b.dataset.val) === q.a) b.classList.add('reveal');
      });
      btn.classList.add(correct ? 'correct' : 'incorrect');
      const fb = document.getElementById('powerFeedback');
      fb.className = 'feedback show ' + (correct ? 'correct' : 'incorrect');
      fb.innerHTML = `<h4>${correct ? '✓ Got it!' : 'Not quite — here\'s why:'}</h4><p>${q.why}</p>`;
      registerScore('powers', correct);
      document.getElementById('powerNext').disabled = false;
      if (correct) toast('Nice! ⚡');
    });
  });
}

// ============================================================
// Activity 3: BIDMAS Boss
// ============================================================
const BIDMAS_QUESTIONS = [
  {
    expr: '7 + 5 × (12 - 3)',
    steps: [
      { name: 'Brackets', from: '7 + 5 × (12 - 3)', to: '7 + 5 × 9' },
      { name: 'Multiplication', from: '7 + 5 × 9', to: '7 + 45' },
      { name: 'Addition', from: '7 + 45', to: '52' },
    ],
    final: 52,
  },
  {
    expr: '20 - 3 × 4',
    steps: [
      { name: 'Multiplication', from: '20 - 3 × 4', to: '20 - 12' },
      { name: 'Subtraction', from: '20 - 12', to: '8' },
    ],
    final: 8,
  },
  {
    expr: '(8 + 4) ÷ 2 + 5',
    steps: [
      { name: 'Brackets', from: '(8 + 4) ÷ 2 + 5', to: '12 ÷ 2 + 5' },
      { name: 'Division', from: '12 ÷ 2 + 5', to: '6 + 5' },
      { name: 'Addition', from: '6 + 5', to: '11' },
    ],
    final: 11,
  },
  {
    expr: '3 + 4² × 2',
    steps: [
      { name: 'Indices (powers)', from: '3 + 4² × 2', to: '3 + 16 × 2' },
      { name: 'Multiplication', from: '3 + 16 × 2', to: '3 + 32' },
      { name: 'Addition', from: '3 + 32', to: '35' },
    ],
    final: 35,
  },
  {
    expr: '50 - (6 + 4) × 3',
    steps: [
      { name: 'Brackets', from: '50 - (6 + 4) × 3', to: '50 - 10 × 3' },
      { name: 'Multiplication', from: '50 - 10 × 3', to: '50 - 30' },
      { name: 'Subtraction', from: '50 - 30', to: '20' },
    ],
    final: 20,
  },
];

const BIDMAS_OPS = ['Brackets', 'Indices (powers)', 'Division', 'Multiplication', 'Addition', 'Subtraction'];

function buildBidmasActivity(qIdx = 0) {
  const q = BIDMAS_QUESTIONS[qIdx % BIDMAS_QUESTIONS.length];
  let stepIdx = 0;
  let questionScored = false;

  const html = `
    <div class="question-box">
      <div class="question-prompt">Work through this step by step (use BIDMAS)</div>
      <div class="question-content">${q.expr}</div>
    </div>
    <div class="tip"><strong>BIDMAS:</strong> <u>B</u>rackets → <u>I</u>ndices → <u>D</u>ivision/<u>M</u>ultiplication → <u>A</u>ddition/<u>S</u>ubtraction</div>
    <div id="bidmasSteps" class="step-list"></div>
    <div id="bidmasPrompt"></div>
    <div class="feedback" id="bidmasFeedback"></div>
    <div class="actions">
      <button class="btn hidden" id="bidmasNext" onclick="buildBidmasActivity(${qIdx + 1})">Next question</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

  function renderStep() {
    const stepsEl = document.getElementById('bidmasSteps');
    const promptEl = document.getElementById('bidmasPrompt');
    let stepsHtml = '';
    for (let i = 0; i < stepIdx; i++) {
      const s = q.steps[i];
      stepsHtml += `<div class="step-row done">
        <div class="step-label">Step ${i+1}: ${s.name}</div>
        ${s.from} = ${s.to}
      </div>`;
    }
    if (stepIdx < q.steps.length) {
      const s = q.steps[stepIdx];
      stepsHtml += `<div class="step-row active">
        <div class="step-label">Step ${stepIdx+1}: working on...</div>
        ${s.from}
      </div>`;
    }
    stepsEl.innerHTML = stepsHtml;

    if (stepIdx < q.steps.length) {
      // Ask which operation goes next
      // Show plausible options
      const correct = q.steps[stepIdx].name;
      const wrongs = BIDMAS_OPS.filter(o => o !== correct && q.steps[stepIdx].from.match(operatorPresent(o)))
                              .slice(0, 2);
      // Always include 1-2 other plausible options
      let opts = [correct, ...wrongs];
      while (opts.length < 3) {
        const r = BIDMAS_OPS[Math.floor(Math.random() * BIDMAS_OPS.length)];
        if (!opts.includes(r)) opts.push(r);
      }
      opts = opts.sort(() => Math.random() - 0.5);
      promptEl.innerHTML = `
        <div style="text-align:center;margin:14px 0">
          <div style="font-size:14px;color:#6b7280;margin-bottom:10px">What goes next?</div>
          <div class="options" id="bidmasOpts">
            ${opts.map(o => `<button class="option-btn normal" data-name="${o}">${o}</button>`).join('')}
          </div>
        </div>
      `;
      document.querySelectorAll('#bidmasOpts .option-btn').forEach(b => {
        b.addEventListener('click', () => {
          const isCorrect = b.dataset.name === correct;
          document.querySelectorAll('#bidmasOpts .option-btn').forEach(x => {
            x.disabled = true;
            if (x.dataset.name === correct) x.classList.add('reveal');
          });
          b.classList.add(isCorrect ? 'correct' : 'incorrect');
          if (!questionScored) {
            registerScore('bidmas', isCorrect);
            questionScored = true;
            // Only count first answer for this question, but continue stepping
          }
          if (isCorrect) {
            setTimeout(() => { stepIdx++; renderStep(); }, 600);
            toast('Yes!', false);
          } else {
            const fb = document.getElementById('bidmasFeedback');
            fb.className = 'feedback show incorrect';
            fb.innerHTML = `<h4>Not quite</h4><p>${correct} comes next. ${bidmasHint(correct)}</p>
              <button class="btn" style="margin-top:10px" onclick="this.parentElement.classList.remove('show');document.querySelector('.feedback').classList.remove('show');advanceBidmas()">Continue</button>`;
            window.advanceBidmas = () => {
              document.getElementById('bidmasFeedback').className = 'feedback';
              stepIdx++;
              renderStep();
            };
          }
        });
      });
    } else {
      promptEl.innerHTML = `<div style="text-align:center;font-size:22px;color:#10b981;font-weight:bold;margin:14px">🎉 Final answer: ${q.final}</div>`;
      document.getElementById('bidmasNext').classList.remove('hidden');
    }
  }

  function operatorPresent(opName) {
    const map = {
      'Brackets': /[()]/,
      'Indices (powers)': /²|³|\^/,
      'Division': /÷|\//,
      'Multiplication': /×|\*/,
      'Addition': /\+/,
      'Subtraction': /-/,
    };
    return map[opName] || /./;
  }
  function bidmasHint(op) {
    return {
      'Brackets': 'Always do things inside brackets first.',
      'Indices (powers)': 'Powers (like ²) come before multiply/divide.',
      'Division': 'Divide before you add or subtract.',
      'Multiplication': 'Multiply before you add or subtract.',
      'Addition': 'Add after powers, multiply, divide.',
      'Subtraction': 'Subtract after powers, multiply, divide.',
    }[op] || '';
  }

  renderStep();
}

const FACTOR_QUESTIONS = [
  { n: 30, pairs: [[1,30],[2,15],[3,10],[5,6]], primes: [2,3,5] },
  { n: 24, pairs: [[1,24],[2,12],[3,8],[4,6]], primes: [2,3] },
  { n: 36, pairs: [[1,36],[2,18],[3,12],[4,9],[6,6]], primes: [2,3] },
  { n: 18, pairs: [[1,18],[2,9],[3,6]], primes: [2,3] },
  { n: 42, pairs: [[1,42],[2,21],[3,14],[6,7]], primes: [2,3,7] },
];

function buildFactorsActivity(qIdx = 0) {
  const q = FACTOR_QUESTIONS[qIdx % FACTOR_QUESTIONS.length];
  let foundPairs = [];
  let phase = 'pairs'; // 'pairs' then 'primes'
  let scoredThisQ = false;

  const html = `
    <div class="question-box">
      <div class="question-prompt">Find ALL factor pairs of</div>
      <div class="question-content">${q.n}</div>
    </div>
    <div class="tip">
      <strong>Tip:</strong> Start at 1 × ${q.n} and work upward. Stop when the small number ≥ the big number.
      Total pairs to find: <strong>${q.pairs.length}</strong>.
    </div>
    <div class="factor-input-row">
      <input type="number" class="input-num" id="factorA" placeholder="?" min="1" max="${q.n}"/>
      <span>×</span>
      <input type="number" class="input-num" id="factorB" placeholder="?" min="1" max="${q.n}"/>
      <span>= ${q.n}</span>
      <button class="btn" onclick="submitPair()">Add pair</button>
    </div>
    <div class="pairs-grid" id="pairsGrid"></div>
    <div class="feedback" id="factorFeedback"></div>
    <div class="actions">
      <button class="btn hidden" id="factorNext" onclick="buildFactorsActivity(${qIdx + 1})">Next number</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

  window.submitPair = () => {
    const a = parseInt(document.getElementById('factorA').value);
    const b = parseInt(document.getElementById('factorB').value);
    if (!a || !b) return;
    if (a * b !== q.n) {
      flashFeedback(`${a} × ${b} = ${a*b}, not ${q.n}. Try again!`, 'incorrect');
      return;
    }
    // Normalise pair order
    const pair = [Math.min(a,b), Math.max(a,b)];
    const exists = foundPairs.some(p => p[0] === pair[0] && p[1] === pair[1]);
    if (exists) {
      flashFeedback('You already added that pair!', 'incorrect');
      return;
    }
    const isReal = q.pairs.some(p => p[0] === pair[0] && p[1] === pair[1]);
    if (!isReal) {
      flashFeedback(`Hmm, ${pair[0]} and ${pair[1]} aren't both factors of ${q.n}.`, 'incorrect');
      return;
    }
    foundPairs.push(pair);
    renderPairs();
    document.getElementById('factorA').value = '';
    document.getElementById('factorB').value = '';
    document.getElementById('factorA').focus();

    if (foundPairs.length === q.pairs.length) {
      enterPrimesPhase();
    }
  };

  function renderPairs() {
    document.getElementById('pairsGrid').innerHTML =
      foundPairs.sort((p, q) => p[0] - q[0]).map(p =>
        `<div class="pair-chip">${p[0]} × ${p[1]}</div>`
      ).join('');
  }

  function flashFeedback(msg, type) {
    const fb = document.getElementById('factorFeedback');
    fb.className = 'feedback show ' + type;
    fb.innerHTML = `<p>${msg}</p>`;
    setTimeout(() => fb.classList.remove('show'), 2200);
  }

  function enterPrimesPhase() {
    phase = 'primes';
    const allFactors = q.pairs.flat();
    const unique = [...new Set(allFactors)].sort((a,b) => a-b);
    document.getElementById('pairsGrid').innerHTML = unique.map(f =>
      `<div class="pair-chip" data-val="${f}" onclick="togglePrime(this)">${f}</div>`
    ).join('');
    document.querySelector('.factor-input-row').classList.add('hidden');
    const fb = document.getElementById('factorFeedback');
    fb.className = 'feedback show correct';
    fb.innerHTML = `<h4>✓ All pairs found!</h4>
      <p>Now CLICK every <strong>prime</strong> factor (number only divisible by 1 and itself).</p>
      <button class="btn" style="margin-top:8px" onclick="checkPrimes()">Check primes</button>`;
    window.togglePrime = (el) => {
      el.classList.toggle('prime');
    };
    window.checkPrimes = () => {
      const chosen = [...document.querySelectorAll('.pair-chip.prime')]
        .map(el => parseInt(el.dataset.val)).sort((a,b)=>a-b);
      const correct = q.primes.slice().sort((a,b)=>a-b);
      const match = chosen.length === correct.length &&
                    chosen.every((v,i) => v === correct[i]);
      const fb = document.getElementById('factorFeedback');
      fb.className = 'feedback show ' + (match ? 'correct' : 'incorrect');
      if (match) {
        fb.innerHTML = `<h4>🌟 Perfect!</h4>
          <p>Primes of ${q.n}: <strong>${correct.join(', ')}</strong>.</p>`;
        registerScore('factors', true);
        toast('Brilliant! 🌟');
      } else {
        fb.innerHTML = `<h4>Close!</h4>
          <p>The primes are: <strong>${correct.join(', ')}</strong>.</p>
          <p style="margin-top:6px"><em>Remember: 1 is NOT prime. Primes only have themselves and 1 as factors.</em></p>`;
        registerScore('factors', false);
      }
      document.getElementById('factorNext').classList.remove('hidden');
    };
  }
}

function buildNamingActivity(qIdx = 0) {
  const q = NAMING_QUESTIONS[qIdx % NAMING_QUESTIONS.length];

  // Build SVG
  const W = 400, H = 280;
  let svg = `<svg class="angle-svg" viewBox="0 0 ${W} ${H}" width="100%" style="max-width:420px">`;
  // Lines
  q.lines.forEach(([a, b]) => {
    const pa = q.points[a], pb = q.points[b];
    svg += `<line x1="${pa[0]}" y1="${pa[1]}" x2="${pb[0]}" y2="${pb[1]}" stroke="#1f2937" stroke-width="2"/>`;
  });
  // Highlight arc at vertex
  const vp = q.points[q.highlight.vertex];
  const fp = q.points[q.highlight.from];
  const tp = q.points[q.highlight.to];
  const angFrom = Math.atan2(fp[1]-vp[1], fp[0]-vp[0]);
  const angTo = Math.atan2(tp[1]-vp[1], tp[0]-vp[0]);
  const r = 28;
  const x1 = vp[0] + r*Math.cos(angFrom);
  const y1 = vp[1] + r*Math.sin(angFrom);
  const x2 = vp[0] + r*Math.cos(angTo);
  const y2 = vp[1] + r*Math.sin(angTo);
  let delta = angTo - angFrom;
  while (delta < 0) delta += 2*Math.PI;
  const largeArc = delta > Math.PI ? 1 : 0;
  // Always go the short way
  const useLarge = delta > Math.PI ? 0 : 0;
  svg += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${useLarge} 1 ${x2} ${y2}" stroke="#7c3aed" stroke-width="3" fill="rgba(124,58,237,0.15)"/>`;
  // Points and labels
  Object.entries(q.points).forEach(([label, [x, y]]) => {
    svg += `<circle cx="${x}" cy="${y}" r="4" fill="#1f2937"/>`;
    // Label position offset slightly
    const lx = x < W/2 ? x - 14 : x + 10;
    const ly = y < H/2 ? y - 8 : y + 18;
    svg += `<text x="${lx}" y="${ly}" font-size="16" font-weight="bold" fill="#1f2937">${label}</text>`;
  });
  svg += `</svg>`;

  const html = `
    <div class="question-box">
      <div class="question-prompt">${q.prompt}</div>
      ${svg}
    </div>
    <div class="options" id="namingOpts">
      ${q.opts.map((o, i) => `<button class="option-btn" data-idx="${i}">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="namingFeedback"></div>
    <div class="actions">
      <button class="btn hidden" id="namingNext" onclick="buildNamingActivity(${qIdx + 1})">Next angle</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

  document.querySelectorAll('#namingOpts .option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      const isCorrect = idx === q.correct || idx === q.altCorrect;
      document.querySelectorAll('#namingOpts .option-btn').forEach((b, i) => {
        b.disabled = true;
        if (i === q.correct || i === q.altCorrect) b.classList.add('reveal');
      });
      btn.classList.add(isCorrect ? 'correct' : 'incorrect');
      const fb = document.getElementById('namingFeedback');
      fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
      fb.innerHTML = `<h4>${isCorrect ? '✓ Correct!' : 'Not quite.'}</h4>
        <p>${q.hint}</p>
        ${q.extra ? `<p style="margin-top:6px"><em>${q.extra}</em></p>` : ''}`;
      registerScore('naming', isCorrect);
      document.getElementById('namingNext').classList.remove('hidden');
      if (isCorrect) toast('Spot on! 📐');
    });
  });
}

// Activity 7: Angle Zoo (types of angles)
// ============================================================
const ANGLE_TYPES = ['Acute', 'Right', 'Obtuse', 'Straight', 'Reflex', 'Revolution'];
const TYPE_DEFS = {
  'Acute': 'less than 90°',
  'Right': 'exactly 90°',
  'Obtuse': 'between 90° and 180°',
  'Straight': 'exactly 180° (a straight line)',
  'Reflex': 'between 180° and 360°',
  'Revolution': 'exactly 360° (a full turn)',
};

const TYPE_QUESTIONS = [
  { deg: 45, type: 'Acute' },
  { deg: 90, type: 'Right' },
  { deg: 130, type: 'Obtuse' },
  { deg: 180, type: 'Straight' },
  { deg: 250, type: 'Reflex' },
  { deg: 360, type: 'Revolution' },
  { deg: 30, type: 'Acute' },
  { deg: 160, type: 'Obtuse' },
  { deg: 310, type: 'Reflex' },
  { deg: 75, type: 'Acute' },
];

function buildTypesActivity(qIdx = 0) {
  const q = TYPE_QUESTIONS[qIdx % TYPE_QUESTIONS.length];

  // Draw the angle
  const cx = 150, cy = 150, len = 100;
  const rad = q.deg * Math.PI / 180;
  // First arm goes right
  const x1 = cx + len, y1 = cy;
  // Second arm rotates anti-clockwise by deg
  const x2 = cx + len * Math.cos(-rad);
  const y2 = cy + len * Math.sin(-rad);

  // Arc representing the angle
  const arcR = 30;
  const ax1 = cx + arcR;
  const ay1 = cy;
  const ax2 = cx + arcR * Math.cos(-rad);
  const ay2 = cy + arcR * Math.sin(-rad);
  const largeArc = q.deg > 180 ? 1 : 0;

  let svg = `<svg class="angle-svg" viewBox="0 0 300 300" width="100%" style="max-width:320px">
    <circle cx="${cx}" cy="${cy}" r="3" fill="#1f2937"/>`;
  if (q.deg === 360) {
    // Just draw a circle
    svg += `<circle cx="${cx}" cy="${cy}" r="${arcR}" stroke="#7c3aed" stroke-width="3" fill="rgba(124,58,237,0.1)"/>
            <line x1="${cx}" y1="${cy}" x2="${cx+len}" y2="${cy}" stroke="#1f2937" stroke-width="3"/>
            <text x="${cx}" y="${cy-50}" text-anchor="middle" font-size="14" fill="#7c3aed" font-weight="bold">a full turn</text>`;
  } else {
    svg += `<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="#1f2937" stroke-width="3"/>
            <line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#1f2937" stroke-width="3"/>
            <path d="M ${ax1} ${ay1} A ${arcR} ${arcR} 0 ${largeArc} 0 ${ax2} ${ay2}" stroke="#7c3aed" stroke-width="3" fill="rgba(124,58,237,0.15)"/>`;
  }
  svg += `</svg>`;

  const html = `
    <div class="question-box">
      <div class="question-prompt">What type of angle is this?</div>
      ${svg}
    </div>
    <div class="options" id="typeOpts">
      ${ANGLE_TYPES.map(t => `<button class="option-btn normal" data-type="${t}">${t}</button>`).join('')}
    </div>
    <div class="feedback" id="typeFeedback"></div>
    <div class="actions">
      <button class="btn hidden" id="typeNext" onclick="buildTypesActivity(${qIdx + 1})">Next angle</button>
    </div>
  `;
  document.getElementById('activityBody').innerHTML = html;

// Activity 8: Fraction Stacker (add/subtract fractions)
// ============================================================
const FRACTION_QUESTIONS = [
  { q: '3/8 + 1/8', opts: ['4/8','1/2','3/16','1/4'], correct: 1,
    why: 'Same denominator: just add the tops. 3+1 = 4. So 4/8 = <strong>1/2</strong>.' },
  { q: '5/6 − 1/6', opts: ['4/6','2/3','5/0','4/12'], correct: 1,
    why: 'Same denominator: 5−1 = 4. So 4/6 = <strong>2/3</strong>.' },
  { q: '1/2 + 1/3', opts: ['2/5','5/6','1/6','2/6'], correct: 1,
    why: 'Common denominator is 6. 1/2 = 3/6 and 1/3 = 2/6. 3/6 + 2/6 = <strong>5/6</strong>.' },
  { q: '3/4 − 1/3', opts: ['5/12','2/1','7/12','1/12'], correct: 0,
    why: 'Common denominator is 12. 3/4 = 9/12 and 1/3 = 4/12. 9/12 − 4/12 = <strong>5/12</strong>.' },
  { q: '1/4 + 5/8', opts: ['6/12','7/8','3/4','1 1/8'], correct: 1,
    why: 'Common denominator is 8. 1/4 = 2/8. 2/8 + 5/8 = <strong>7/8</strong>.' },
  { q: '2/3 − 1/2', opts: ['1/1','1/6','1/3','3/5'], correct: 1,
    why: 'Common denominator is 6. 2/3 = 4/6 and 1/2 = 3/6. 4/6 − 3/6 = <strong>1/6</strong>.' },
  { q: '7/10 + 1/5', opts: ['8/15','9/10','3/10','1 1/10'], correct: 1,
    why: 'Common denominator is 10. 1/5 = 2/10. 7/10 + 2/10 = <strong>9/10</strong>.' },
  { q: '3/4 + 1/2', opts: ['1 1/4','4/6','5/4','5/8'], correct: 0,
    why: 'Common denominator is 4. 1/2 = 2/4. 3/4 + 2/4 = 5/4 = <strong>1 1/4</strong>. (Improper fractions convert to mixed numerals.)' },
];

function buildFractionsActivity(qIdx = 0) {
  const q = FRACTION_QUESTIONS[qIdx % FRACTION_QUESTIONS.length];
  const html = `
    <div class="question-box">
      <div class="question-prompt">Solve this fraction sum:</div>
      <div class="question-content">${q.q} = ?</div>

    <div class="options" id="fracOpts">

      });

const INDEX_QUESTIONS = [
  { q: '2⁴', opts: ['8','16','12','6'], correct: 1,
    why: '2⁴ = 2 × 2 × 2 × 2 = <strong>16</strong>.' },

    why: 'Zero-index rule: any non-zero number to the power of 0 equals <strong>1</strong>. So 5⁰ = 1.' },
  { q: '3² × 3³ (as a single power)', opts: ['3⁵','3⁶','9⁵','6⁵'], correct: 0,
    why: 'Same base — ADD the indices: 3² × 3³ = 3^(2+3) = <strong>3⁵</strong> (= 243).' },
  { q: 'x⁶ ÷ x² (as a single power)', opts: ['x³','x⁸','x⁴','x¹²'], correct: 2,

  { type: 'corresponding', given: 45, answer: 45, options: [135, 45, 90, 55],
    why: 'Corresponding angles (F-shape) on parallel lines are <strong>equal</strong>. So x = 45°.' },
  { type: 'cointerior', given: 90, answer: 90, options: [90, 180, 0, 45],

  { type: 'alternate', given: 130, answer: 130, options: [50, 130, 60, 180],
    why: 'Alternate angles are equal — so x = 130°.' },
  { type: 'corresponding', given: 75, answer: 75, options: [105, 75, 90, 15],

// ============================================================
// Scoring + menu
// ============================================================
function ensureActivityState(id) {
  if (!state.activities[id]) {
    state.activities[id] = { correct: 0, total: 0, mastered: false };
  }
  return state.activities[id];
}

function registerScore(id, isCorrect) {
  const a = ensureActivityState(id);
  a.total++;
  if (isCorrect) {
    a.correct++;
    state.totalCorrect++;
  }
  const def = ACTIVITIES.find(x => x.id === id);
  if (a.correct >= def.masterTarget && !a.mastered) {
    a.mastered = true;
    toast(`🏆 Mastered: ${def.title}!`);
  }
  updateScoreboard();
}

function updateScoreboard() {
  document.getElementById('totalCorrect').textContent = state.totalCorrect;
  const masteredCount = Object.values(state.activities).filter(a => a.mastered).length;
  document.getElementById('masteredCount').textContent = masteredCount;
  document.getElementById('overallProgress').style.width = (masteredCount / ACTIVITIES.length * 100) + '%';
}

function renderMenu() {
  const html = ACTIVITIES.map(a => {
    const s = state.activities[a.id] || { correct: 0, total: 0, mastered: false };
    const masteredClass = s.mastered ? 'mastered' : '';
    return `
      <div class="activity-card ${masteredClass}" onclick="openActivity('${a.id}')">
        <div class="icon">${a.icon}</div>
        <h3>${a.title} ${s.mastered ? '<span class="check">✓</span>' : ''}</h3>
        <div class="focus">${a.focus}</div>
        <p>${a.desc}</p>
        <div class="stats">Correct: ${s.correct} · Goal: ${a.masterTarget}</div>
      </div>
    `;
  }).join('');
  document.getElementById('menu').innerHTML = html;
}

function openActivity(id) {
  const def = ACTIVITIES.find(a => a.id === id);
  document.getElementById('menu').classList.add('hidden');
  const area = document.getElementById('activityArea');
  area.classList.remove('hidden');
  area.innerHTML = `
    <div class="activity-screen">
      <div class="activity-header">
        <button class="back-btn" onclick="closeActivity()">← Back to menu</button>
        <div class="activity-title">${def.icon} ${def.title}</div>
        <div class="round-counter">Goal: ${def.masterTarget} correct</div>
      </div>
      <div id="activityBody"></div>
    </div>
  `;
  // Dispatch
  switch (id) {
    case 'order': buildOrderActivity(); break;
    case 'powers': buildPowersActivity(); break;
    case 'bidmas': buildBidmasActivity(); break;
    case 'factors': buildFactorsActivity(); break;
    case 'brackets': buildBracketsActivity(); break;
    case 'naming': buildNamingActivity(); break;
    case 'types': buildTypesActivity(); break;
    case 'fractions': buildFractionsActivity(); break;
    case 'indices': buildIndicesActivity(); break;
    case 'parallels': buildParallelsActivity(); break;
  }
}

function closeActivity() {
  document.getElementById('activityArea').classList.add('hidden');
  document.getElementById('menu').classList.remove('hidden');
  renderMenu();
}

function toast(msg, success = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? '' : ' error');
  setTimeout(() => t.classList.remove('show'), 1600);
}

// ============================================================
// Init
// ============================================================
renderMenu();
updateScoreboard();

// expose for inline handlers
window.openActivity = openActivity;
window.closeActivity = closeActivity;
window.buildPowersActivity = buildPowersActivity;
window.buildBidmasActivity = buildBidmasActivity;
window.buildFactorsActivity = buildFactorsActivity;
window.buildBracketsActivity = buildBracketsActivity;
window.buildNamingActivity = buildNamingActivity;
window.buildTypesActivity = buildTypesActivity;
window.buildFractionsActivity = buildFractionsActivity;
window.buildIndicesActivity = buildIndicesActivity;
window.buildParallelsActivity = buildParallelsActivity;
</script>
